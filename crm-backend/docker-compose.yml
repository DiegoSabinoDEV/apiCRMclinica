services:
  postgres:
    image: postgres:16-alpine
    container_name: harmonny-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: harmonny_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: harmonny-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
